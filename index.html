<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sambung Kata</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PAGE 1: MENU UTAMA -->
  <div id="page1" class="page active">
    <h1>Sambung Kata</h1>
    <p>Silahkan pilih mode</p>
    <button onclick="goToPage('page2')">Lawan Bot</button>
    <button onclick="goToPage('page3')">2 Player</button>
  </div>

  <!-- PAGE 2: MODE BOT -->
  <div id="page2" class="page">
    <h2>Pilih Mode</h2>
    <select id="modeSelect">
  <option value="mudah">Mudah</option>
  <option value="normal">Normal</option>
  <option value="sulit">Sulit</option>
</select>

    <br><br>
    <button onclick="startBotGame()">Mulai Game</button>
    <button onclick="goToPage('page1')">Kembali</button>
  </div>

  <!-- PAGE 3: INPUT 2 PLAYER -->
  <div id="page3" class="page">
    <h2>Masukkan Nama Player</h2>
    <input type="text" id="player1" placeholder="Player 1">
    <input type="text" id="player2" placeholder="Player 2">

    <br><br>
    <button onclick="startTwoPlayerGame()">Mulai Game</button>
    <button onclick="goToPage('page1')">Kembali</button>
  </div>

  <!-- PAGE 4/5/6: GAME BOT -->
  <div id="pageGameBot" class="page">
    <h2 id="modeTitle">Mode</h2>

    <div id="countdown">3</div>

    <div class="game-info">
      <p><span id="lives">❤️❤️❤️</span></p>
      <p>Timer: <span id="timer">10</span></p>
    </div>

    <h3 id="currentWord">Kata</h3>

    <input type="text" id="playerInput" placeholder="Masukkan kata">
    <button onclick="submitWord()">Kirim</button>
    <p id="messageBot" class="message"></p>
    <br><br>
    <button onclick="goToPage('page1')">Kembali</button>
  </div>

  <!-- PAGE 7: GAME 2 PLAYER -->
  <div id="pageGame2" class="page">
    <h2 id="turnInfo">Giliran Player</h2>

    <div id="countdown2">3</div>

    <div class="game-info">
      <p id="livesP1">P1: ❤️❤️❤️</p>
      <p id="livesP2">P2: ❤️❤️❤️</p>
      <p>Timer: <span id="timer2">10</span></p>
    </div>

    <h3 id="currentWord2">Kata</h3>

    <input type="text" id="playerInput2" placeholder="Masukkan kata">
    <button onclick="submitWord2()">Kirim</button>
    <p id="message2" class="message"></p>
    <br><br>
    <button onclick="goToPage('page1')">Kembali</button>
  </div>

  <!-- POPUP -->
  <div id="popup" class="popup">
    <div class="popup-content">
      <h2 id="popupText">Game Over</h2>
      <button onclick="restartGame()">Mulai Lagi</button>
      <button onclick="goToPage('page1')">Kembali ke Menu</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
